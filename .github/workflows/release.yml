name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '0.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          fi
          echo "APP_VERSION=$VER" >> $GITHUB_ENV

      - name: Update version in tauri.conf.json
        shell: pwsh
        run: |
          $ver = "${{ env.APP_VERSION }}"
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.version = $ver
          $json | ConvertTo-Json -Depth 10 | Set-Content $path
          Write-Output "Version set to $ver"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'aab2apkGUI v${{ env.APP_VERSION }}'
          releaseBody: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | Portable (`.exe`) | 免安装，下载即用 |
            | Windows | NSIS (`.exe`) | 安装版 |
            | Windows | MSI (`.msi`) | 安装版 |
            | macOS | DMG (`.dmg`) | 安装版 |

            ## 使用说明

            1. 安装 [JDK 11+](https://adoptium.net/download/)
            2. 下载 [bundletool.jar](https://github.com/google/bundletool/releases)
            3. 启动后在设置中配置 bundletool 路径
          releaseDraft: false
          prerelease: false

      - name: Upload portable exe
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PORTABLE="src-tauri/target/release/aab2apk-gui.exe"
          if [ -f "$PORTABLE" ]; then
            TAG="${{ github.ref_name }}"
            UPLOAD="aab2apkGUI_${{ env.APP_VERSION }}_portable.exe"
            cp "$PORTABLE" "$UPLOAD"
            gh release upload "$TAG" "$UPLOAD" --clobber
            echo "Uploaded $UPLOAD"
          else
            echo "Portable exe not found at $PORTABLE"
          fi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          fi
          echo "APP_VERSION=$VER" >> $GITHUB_ENV

      - name: Update version in tauri.conf.json
        run: |
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$APP_VERSION\"/" src-tauri/tauri.conf.json
          echo "Version set to $APP_VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'aab2apkGUI v${{ env.APP_VERSION }}'
          releaseBody: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | Portable (`.exe`) | 免安装，下载即用 |
            | Windows | NSIS (`.exe`) | 安装版 |
            | Windows | MSI (`.msi`) | 安装版 |
            | macOS | DMG (`.dmg`) | 安装版 |

            ## 使用说明

            1. 安装 [JDK 11+](https://adoptium.net/download/)
            2. 下载 [bundletool.jar](https://github.com/google/bundletool/releases)
            3. 启动后在设置中配置 bundletool 路径
          releaseDraft: false
          prerelease: false
